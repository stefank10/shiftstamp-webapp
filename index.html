<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShiftStamp</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header>
      <h1>ShiftStamp</h1>
      <span id="statusBadge" class="status-badge">Clocked Off</span>
    </header>

    <section class="clock-section">
      <div id="liveTimer" class="live-timer hidden">00:00:00</div>
      <div class="clock-buttons">
        <button id="clockInBtn" onclick="clockIn()">Clock On</button>
        <button id="clockOutBtn" onclick="clockOut()">Clock Off</button>
      </div>
    </section>

    <section class="totals">
      <div class="total-card">
        <span class="label">Today</span>
        <span id="todayTotal" class="value">00:00</span>
      </div>
      <div class="total-card">
        <span class="label">This Week</span>
        <span id="weekTotal" class="value">00:00</span>
      </div>
      <div class="total-card">
        <span class="label">This Month</span>
        <span id="monthTotal" class="value">00:00</span>
      </div>
    </section>

    <section class="history">
      <h2>Shift History</h2>
      <ul id="shiftList"></ul>
    </section>

    <section class="actions">
      <button onclick="exportCSV()">Export CSV</button>
      <button onclick="importCSV()">Import CSV</button>
    </section>

  </div>
  <script src="app.js"></script>
</body>
</html>
